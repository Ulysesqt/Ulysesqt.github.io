<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novacraft SMP</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #232342);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(45deg, purple, cyan, blue);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 5s infinite linear;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .content {
      border: 3px solid transparent;
      padding: 2rem;
      margin-top: 1rem;
      border-radius: 15px;
      position: relative;
      animation: borderGlow 5s linear infinite;
    }

    @keyframes borderGlow {
      0% { border-color: #9b59b6; }
      33% { border-color: #00ffff; }
      66% { border-color: #3498db; }
      100% { border-color: #9b59b6; }
    }

    .content::before {
      content: "";
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      z-index: -1;
      background: linear-gradient(270deg, purple, cyan, blue);
      background-size: 600% 600%;
      animation: animateBg 10s ease infinite;
      border-radius: 20px;
    }

    @keyframes animateBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .content p {
      font-size: 1.2rem;
      margin: 0.5rem 0;
    }

    a {
      color: cyan;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Novacraft SMP</h1>
  <div class="content">
    <p>THIS IS A MINECRAFT COMMUNITY SERVER</p>
    <p>OWNER: ZAIRU</p>
    <p><a href="https://yourlinkhere.com" target="_blank">Join group chat messenger here</a></p>
  </div>
</body>
</html>
